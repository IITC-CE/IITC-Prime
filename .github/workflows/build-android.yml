name: Build Android

on:
  push:
    branches: [master]
    tags: ['*']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set build script
        run: |
          if [[ $GITHUB_REF == refs/heads/master ]]; then
            echo "BUILD_TYPE=beta" >> $GITHUB_ENV
            echo "BUILD_SCRIPT=build:android:beta" >> $GITHUB_ENV
          elif [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "BUILD_TYPE=release" >> $GITHUB_ENV
            echo "BUILD_SCRIPT=build:android:release" >> $GITHUB_ENV
          fi

      - name: Build Android APK
        uses: ./.github/actions/build-android
        id: build
        with:
          build-script: ${{ env.BUILD_SCRIPT }}
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.KEYSTORE_PASSWORD }}
          keystore-alias: ${{ secrets.KEYSTORE_ALIAS }}
          keystore-alias-password: ${{ secrets.KEYSTORE_ALIAS_PASSWORD }}
          sentry-org-slug: ${{ secrets.SENTRY_ORG_SLUG }}
          sentry-project-slug: ${{ secrets.SENTRY_PROJECT_SLUG }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          sentry-dsn-android: ${{ secrets.SENTRY_DSN_ANDROID }}

      - name: Create release for tags
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: ${{ steps.build.outputs.output-path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare metadata
        run: |
          mkdir -p artifact/.metadata
          echo "${{ env.BUILD_TYPE }}" > artifact/.metadata/build_type
          echo "${{ github.sha }}" > artifact/.metadata/commit
          echo "${{ steps.build.outputs.output-filename }}" > artifact/.metadata/apk_filename
          echo "$(date -u +'%Y-%m-%d_%H-%M')" > artifact/.metadata/buildstamp

          mkdir -p artifact/build
          cp "${{ steps.build.outputs.output-path }}" artifact/build/

      - uses: actions/upload-artifact@v4
        id: upload-artifact
        with:
          name: android-build
          include-hidden-files: true
          path: |
            artifact/.metadata/
            artifact/build/

      - name: Get artifact ID
        id: get-artifact-id
        if: vars.WEBSITE_REPO != ''
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });
            const artifact = artifacts.data.artifacts.find(a => a.name === 'android-build');
            return artifact.id;

      - name: Send build to website
        if: vars.WEBSITE_REPO != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.API_TOKEN_GITHUB }}
          repository: ${{ vars.WEBSITE_REPO }}
          event-type: 'new_iitc_prime_build'
          client-payload: |
            {
              "repo": {
                "owner": "${{ github.repository_owner }}",
                "repo": "${{ github.event.repository.name }}"
              },
              "artifact_id": "${{ steps.get-artifact-id.outputs.result }}"
            }
