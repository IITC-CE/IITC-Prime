name: 'Prepare iOS'
description: 'Install dependencies, set up code signing, and prepare the NativeScript iOS Xcode project'

inputs:
  prepare-script:
    description: 'npm prepare script to run (e.g. prepare:ios:appstore-beta)'
    required: true
  apple-team-id:
    description: 'Apple Developer Team ID'
    required: true
  certificate-base64:
    description: 'Base64-encoded Apple Distribution certificate (.p12)'
    required: true
  certificate-password:
    description: 'Certificate password'
    required: true
  provisioning-profile-base64:
    description: 'Base64-encoded App Store provisioning profile (.mobileprovision)'
    required: true
  keychain-password:
    description: 'Password for the temporary keychain'
    required: true
  sentry-org-slug:
    description: 'Sentry organization slug'
    required: false
    default: ''
  sentry-project-slug:
    description: 'Sentry project slug'
    required: false
    default: ''
  sentry-auth-token:
    description: 'Sentry auth token'
    required: false
    default: ''
  sentry-dsn-ios:
    description: 'Sentry DSN for iOS'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup cache
      uses: ./.github/actions/setup-cache

    - name: Install dependencies
      shell: bash
      run: npm install

    - name: Install NativeScript CLI
      shell: bash
      run: npm install -g nativescript

    - name: Install code signing assets
      shell: bash
      env:
        CERTIFICATE_BASE64: ${{ inputs.certificate-base64 }}
        CERTIFICATE_PASSWORD: ${{ inputs.certificate-password }}
        PROVISIONING_PROFILE_BASE64: ${{ inputs.provisioning-profile-base64 }}
        KEYCHAIN_PASSWORD: ${{ inputs.keychain-password }}
      run: |
        KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security default-keychain -s "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

        echo "$CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12
        security import /tmp/certificate.p12 -k "$KEYCHAIN_PATH" \
          -P "$CERTIFICATE_PASSWORD" \
          -T /usr/bin/codesign -T /usr/bin/xcodebuild
        security set-key-partition-list \
          -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
        echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

        security cms -D -i "$PP_PATH" > /tmp/profile.plist
        PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID.mobileprovision"

        echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
        echo "APPLE_TEAM_ID=${{ inputs.apple-team-id }}" >> $GITHUB_ENV

    - name: Install CocoaPods plugins
      shell: bash
      run: gem install cocoapods-acknowledgements

    - name: Sync iOS version from git timestamp
      shell: bash
      run: npm run version:sync-ios

    - name: Prepare iOS Xcode project
      shell: bash
      env:
        SENTRY_ORG_SLUG: ${{ inputs.sentry-org-slug }}
        SENTRY_PROJECT_SLUG: ${{ inputs.sentry-project-slug }}
        SENTRY_AUTH_TOKEN: ${{ inputs.sentry-auth-token }}
        SENTRY_DSN_IOS: ${{ inputs.sentry-dsn-ios }}
      run: npm run ${{ inputs.prepare-script }}

    - name: Find Xcode workspace
      shell: bash
      run: |
        WORKSPACE=$(find platforms/ios -name "*.xcworkspace" -maxdepth 2 | head -1)
        echo "Found workspace: $WORKSPACE"
        echo "IOS_WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
